name: CI Core

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"
  TEST_RESULTS_DIR: "TestResults"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SalmonEgg.sln

      - name: Build
        run: dotnet build SalmonEgg.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        timeout-minutes: 20
        shell: pwsh
        run: |
          $testArgs = @(
            "test",
            "SalmonEgg.sln",
            "--configuration", "${{ env.CONFIGURATION }}",
            "--no-build",
            "--verbosity", "normal",
            "--collect:XPlat Code Coverage",
            "--blame-hang",
            "--blame-hang-timeout", "5m",
            "--logger", "trx;LogFilePrefix=results",
            "--results-directory", "${{ env.TEST_RESULTS_DIR }}"
          )

          Write-Host "Running test pass 1..."
          dotnet @testArgs
          if ($LASTEXITCODE -eq 0)
          {
              exit 0
          }

          Write-Warning "Test pass 1 failed. Retrying once to filter transient flakiness..."
          dotnet @testArgs
          if ($LASTEXITCODE -ne 0)
          {
              exit $LASTEXITCODE
          }

      - name: Run Core Gate Script
        shell: pwsh
        run: ./scripts/gates/run-core-gates.ps1 -Configuration ${{ env.CONFIGURATION }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: "${{ env.TEST_RESULTS_DIR }}/**/*.trx"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: "**/coverage*.xml"
