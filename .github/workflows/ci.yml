name: CI/CD
on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'
  PROJECT_NAME: 'SalmonEgg'

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore SalmonEgg.sln

    - name: Build
      run: dotnet build SalmonEgg.sln --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Test
      run: dotnet test SalmonEgg.sln --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: '**/TestResults/*.trx'
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: '**/coverage*.xml'

  package-wasm:
    name: Package WebAssembly
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish WebAssembly
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net9.0-browserwasm -c ${{ env.CONFIGURATION }} -o ../../publish/wasm
      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v3
        with:
          name: wasm-build
          path: publish/wasm

  package-desktop:
    name: Package Desktop
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish Desktop (Windows)
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net9.0-desktop -c ${{ env.CONFIGURATION }} -o ../../publish/desktop-windows
      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v3
        with:
          name: desktop-windows-build
          path: publish/desktop-windows

  publish:
    name: Publish Releases
    needs: [package-wasm, package-desktop]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download WebAssembly artifact
        uses: actions/download-artifact@v3
        with:
          name: wasm-build
          path: wasm
      - name: Download Desktop artifact
        uses: actions/download-artifact@v3
        with:
          name: desktop-windows-build
          path: desktop
      - name: Upload Release Asset (WASM)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./wasm/wwwroot/SalmonEgg.zip
          asset_name: SalmonEgg-wasm.zip
          asset_content_type: application/zip
      - name: Upload Release Asset (Desktop)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./desktop/SalmonEgg.zip
          asset_name: SalmonEgg-desktop.zip
          asset_content_type: application/zip
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish WebAssembly
      run: |
        cd SalmonEgg/SalmonEgg
        dotnet publish -f net9.0-browserwasm -c ${{ env.CONFIGURATION }} -o ../../publish/wasm

    - name: Upload WebAssembly artifact
      uses: actions/upload-artifact@v3
      with:
        name: wasm-build
        path: publish/wasm

  code-quality:
    name: Code Quality Checks
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore SalmonEgg.sln

    - name: Check formatting
      run: dotnet format SalmonEgg.sln --verify-no-changes --no-restore

    - name: Build with analyzers
      run: dotnet build SalmonEgg.sln --configuration ${{ env.CONFIGURATION }} --no-restore /p:EnforceCodeStyleInBuild=true
