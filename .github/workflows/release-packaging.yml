name: Release Packaging

on:
  push:
    tags: ["v*"]
  release:
    types: [created]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"

jobs:
  package-wasm:
    name: Package WebAssembly
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish WebAssembly
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net10.0-browserwasm -c ${{ env.CONFIGURATION }} -o ../../publish/wasm

      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v5
        with:
          name: wasm-build
          path: publish/wasm

  package-desktop:
    name: Package Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Desktop (Windows)
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net10.0-desktop -c ${{ env.CONFIGURATION }} -o ../../publish/desktop-windows

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress

      - name: Build Windows Skia MSI
        shell: pwsh
        run: |
          $desktopDir = Join-Path $env:GITHUB_WORKSPACE "publish\desktop-windows"
          if (-not (Test-Path $desktopDir)) {
            throw "Desktop publish output not found: $desktopDir"
          }

          $installerDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\installer"
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null

          $harvestPath = Join-Path $installerDir "Harvest.wxs"
          heat dir $desktopDir `
            -cg SalmonEggDesktopFiles `
            -dr INSTALLFOLDER `
            -srd `
            -sreg `
            -sfrag `
            -gg `
            -out $harvestPath

          $productPath = Join-Path $installerDir "Product.wxs"
          @'
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
  <Product Id="*" Name="SalmonEgg (Desktop)" Language="1033" Version="1.0.0" Manufacturer="SalmonLoop" UpgradeCode="A2F958DF-D4A4-4E9A-A487-E7CFF31E3271">
    <Package InstallerVersion="500" Compressed="yes" InstallScope="perUser" InstallPrivileges="limited" />
    <MajorUpgrade DowngradeErrorMessage="A newer version of SalmonEgg is already installed." />
    <MediaTemplate EmbedCab="yes" />

    <Feature Id="MainFeature" Title="SalmonEgg Desktop" Level="1">
      <ComponentGroupRef Id="SalmonEggDesktopFiles" />
    </Feature>

    <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
    <UIRef Id="WixUI_InstallDir" />
    <UIRef Id="WixUI_ErrorProgressText" />
  </Product>

  <Fragment>
    <Directory Id="TARGETDIR" Name="SourceDir">
      <Directory Id="LocalAppDataFolder">
        <Directory Id="INSTALLFOLDER" Name="SalmonEgg" />
      </Directory>
    </Directory>
  </Fragment>
</Wix>
'@ | Set-Content -Path $productPath -Encoding UTF8

          $wixObjDir = Join-Path $installerDir "obj"
          New-Item -ItemType Directory -Force -Path $wixObjDir | Out-Null

          candle `
            -ext WixUIExtension `
            -out (Join-Path $wixObjDir "") `
            $productPath `
            $harvestPath

          $msiPath = Join-Path $installerDir "SalmonEgg-desktop-x64.msi"
          light `
            -ext WixUIExtension `
            -cultures:en-us `
            -out $msiPath `
            (Join-Path $wixObjDir "Product.wixobj") `
            (Join-Path $wixObjDir "Harvest.wixobj")

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-build
          path: publish/desktop-windows

      - name: Upload Windows Skia MSI artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-skia-msi
          path: artifacts/installer/*.msi

  package-windows-msix:
    name: Package Windows MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore WinUI app for isolated MSIX build
        shell: pwsh
        run: |
          dotnet msbuild `
            SalmonEgg/SalmonEgg/SalmonEgg.csproj `
            /t:Restore `
            /p:Configuration=${{ env.CONFIGURATION }} `
            /p:TargetFramework=net10.0-windows10.0.26100.0 `
            /p:EnableWinUIBuild=true `
            /p:IsolatedMsixBuild=true `
            /p:BuildProjectReferences=false `
            /p:DisableCustomWinSdkXamlReferences=true `
            /v:minimal

      - name: Build net10.0 references
        shell: pwsh
        run: |
          dotnet build `
            src/SalmonEgg.Presentation.Core/SalmonEgg.Presentation.Core.csproj `
            -c ${{ env.CONFIGURATION }} `
            -f net10.0 `
            -v minimal

      - name: Prepare MSIX signing certificate
        shell: pwsh
        env:
          MSIX_PFX_BASE64: ${{ secrets.MSIX_PFX_BASE64 }}
          MSIX_PFX_PASSWORD: ${{ secrets.MSIX_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MSIX_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:MSIX_PFX_PASSWORD)) {
            throw "MSIX signing secrets missing. Set MSIX_PFX_BASE64 and MSIX_PFX_PASSWORD in repo secrets."
          }

          $certDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\signing"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $pfxPath = Join-Path $certDir "salmonegg-msix.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:MSIX_PFX_BASE64))

      - name: Publish Windows MSIX
        shell: pwsh
        run: |
          dotnet msbuild `
            SalmonEgg/SalmonEgg/SalmonEgg.csproj `
            /t:Publish `
            /p:Configuration=${{ env.CONFIGURATION }} `
            /p:TargetFramework=net10.0-windows10.0.26100.0 `
            /p:PublishProfile=Properties/PublishProfiles/win-msix-x64.pubxml `
            /p:EnableWinUIBuild=true `
            /p:IsolatedMsixBuild=true `
            /p:BuildProjectReferences=false `
            /p:DisableCustomWinSdkXamlReferences=true `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="${{ github.workspace }}\artifacts\signing\salmonegg-msix.pfx" `
            /p:PackageCertificatePassword="${{ secrets.MSIX_PFX_PASSWORD }}" `
            /p:Restore=false `
            /v:minimal

      - name: Upload Windows MSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-msix
          path: artifacts/msix/**/*.msix

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    env:
      MACOS_RID: osx-arm64
      MACOS_APP_CODESIGN_KEY: ${{ secrets.MACOS_APP_CODESIGN_KEY }}
      MACOS_DMG_CODESIGN_KEY: ${{ secrets.MACOS_DMG_CODESIGN_KEY }}
      MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish macOS app bundle
        shell: pwsh
        run: |
          cd SalmonEgg/SalmonEgg
          $codesignArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:MACOS_APP_CODESIGN_KEY))
          {
            $codesignArgs += "-p:CodesignKey=$env:MACOS_APP_CODESIGN_KEY"
          }

          dotnet publish `
            -f net10.0-desktop `
            -c ${{ env.CONFIGURATION }} `
            -r $env:MACOS_RID `
            -p:PackageFormat=app `
            -p:RuntimeIdentifiers=$env:MACOS_RID `
            @codesignArgs

      - name: Collect macOS app bundle
        run: |
          set -euo pipefail
          mkdir -p publish/macos-bundle
          APP_PATH=$(find SalmonEgg/SalmonEgg/bin/${{ env.CONFIGURATION }}/net10.0-desktop/${MACOS_RID}/publish -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in Uno publish output"
            exit 1
          fi
          cp -R "$APP_PATH" publish/macos-bundle/

      - name: Publish macOS disk image
        if: env.MACOS_APP_CODESIGN_KEY != '' && env.MACOS_DMG_CODESIGN_KEY != ''
        shell: pwsh
        run: |
          cd SalmonEgg/SalmonEgg
          $notaryArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:MACOS_NOTARY_PROFILE))
          {
            $notaryArgs += "-p:UnoMacOSNotarizeKeychainProfile=$env:MACOS_NOTARY_PROFILE"
          }

          dotnet publish `
            -f net10.0-desktop `
            -c ${{ env.CONFIGURATION }} `
            -r $env:MACOS_RID `
            -p:SelfContained=true `
            -p:PackageFormat=dmg `
            -p:RuntimeIdentifiers=$env:MACOS_RID `
            -p:CodesignKey=$env:MACOS_APP_CODESIGN_KEY `
            -p:DiskImageSigningKey=$env:MACOS_DMG_CODESIGN_KEY `
            @notaryArgs

      - name: Collect macOS disk image
        if: env.MACOS_APP_CODESIGN_KEY != '' && env.MACOS_DMG_CODESIGN_KEY != ''
        run: |
          set -euo pipefail
          mkdir -p publish/dmg
          DMG_PATH=$(find SalmonEgg/SalmonEgg/bin/${{ env.CONFIGURATION }}/net10.0-desktop/${MACOS_RID}/publish -maxdepth 1 -name "*.dmg" -print -quit)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found in Uno publish output"
            exit 1
          fi
          cp "$DMG_PATH" publish/dmg/

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-bundle
          path: publish/macos-bundle/*

      - name: Upload macOS .dmg artifact
        if: env.MACOS_APP_CODESIGN_KEY != '' && env.MACOS_DMG_CODESIGN_KEY != ''
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-dmg
          path: publish/dmg/*.dmg

  publish-release-assets:
    name: Publish Release Assets
    needs: [package-wasm, package-desktop, package-windows-msix, package-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Download Windows MSIX artifact
        if: needs.package-windows-msix.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: desktop-windows-msix
          path: windows-msix

      - name: Download WebAssembly artifact
        if: needs.package-wasm.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: wasm-build
          path: wasm-build

      - name: Download Windows Skia MSI artifact
        if: needs.package-desktop.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: desktop-windows-skia-msi
          path: windows-skia-msi

      - name: Download macOS bundle artifact
        if: needs.package-macos.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: desktop-macos-bundle
          path: macos-bundle

      - name: Download macOS .dmg artifact
        if: env.MACOS_APP_CODESIGN_KEY != '' && env.MACOS_DMG_CODESIGN_KEY != ''
        uses: actions/download-artifact@v5
        with:
          name: desktop-macos-dmg
          path: macos-dmg

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${RELEASE_TAG}" --repo "${GH_REPO}" --verify-tag --generate-notes

      - name: Prepare release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Copy Windows MSIX package when available
          if [ -d "windows-msix" ]; then
            MSIX_PATH=$(find windows-msix -name "*.msix" -print -quit)
            if [ -n "${MSIX_PATH}" ]; then
              cp "${MSIX_PATH}" release-assets/
            fi
          fi

          # Copy Windows Skia MSI when available
          if [ -d "windows-skia-msi" ]; then
            MSI_PATH=$(find windows-skia-msi -name "*.msi" -print -quit)
            if [ -n "${MSI_PATH}" ]; then
              cp "${MSI_PATH}" release-assets/
            fi
          fi

          # Copy DMG when signing is configured
          if [ -d "macos-dmg" ]; then
            DMG_PATH=$(find macos-dmg -maxdepth 1 -name "*.dmg" -print -quit)
            if [ -n "${DMG_PATH}" ]; then
              cp "${DMG_PATH}" release-assets/
            fi
          fi

          # Package macOS .app as tar.gz for release
          if [ -d "macos-bundle" ]; then
            APP_PATH=$(find macos-bundle -maxdepth 2 -name "*.app" -print -quit)
            if [ -n "${APP_PATH}" ]; then
              APP_DIR=$(dirname "${APP_PATH}")
              APP_NAME=$(basename "${APP_PATH}")
              tar -C "${APP_DIR}" -czf "release-assets/${APP_NAME}.tar.gz" "${APP_NAME}"
            fi
          fi

          # Package WebAssembly output as zip
          if [ -d "wasm-build" ]; then
            zip -r "release-assets/SalmonEgg-wasm.zip" "wasm-build"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" release-assets/* --repo "${GH_REPO}" --clobber
