name: Release Packaging

on:
  push:
    tags: ["v*"]
  release:
    types: [created]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package-wasm:
    name: Package WebAssembly
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish WebAssembly
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net10.0-browserwasm -c ${{ env.CONFIGURATION }} -o ../../publish/wasm

      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v5
        with:
          name: wasm-build
          path: publish/wasm

  package-desktop:
    name: Package Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Desktop (Windows)
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net10.0-desktop -c ${{ env.CONFIGURATION }} -o ../../publish/desktop-windows

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-build
          path: publish/desktop-windows

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Desktop (macOS)
        run: |
          cd SalmonEgg/SalmonEgg
          dotnet publish -f net10.0-desktop -c ${{ env.CONFIGURATION }} -o ../../publish/desktop-macos

      - name: Prepare macOS assets
        run: |
          set -euo pipefail
          mkdir -p publish/macos-bundle publish/dmg
          APP_PATH=$(find publish/desktop-macos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found; creating zip from desktop output."
            (cd publish/desktop-macos && zip -r ../macos-bundle/SalmonEgg-macos.zip .)
            exit 0
          fi
          cp -R "$APP_PATH" publish/macos-bundle/
          DMG_NAME="SalmonEgg-macos.dmg"
          hdiutil create -volname "SalmonEgg" -srcfolder "$APP_PATH" -ov -format UDZO "publish/dmg/$DMG_NAME"

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-bundle
          path: publish/macos-bundle/*

      - name: Upload macOS .dmg artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-dmg
          path: publish/dmg/*.dmg
          if-no-files-found: ignore

  publish-release-assets:
    name: Publish Release Assets
    needs: [package-wasm, package-desktop, package-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download WebAssembly artifact
        uses: actions/download-artifact@v5
        with:
          name: wasm-build
          path: wasm

      - name: Download Desktop artifact
        uses: actions/download-artifact@v5
        with:
          name: desktop-windows-build
          path: desktop

      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: desktop-macos-bundle
          path: macos-bundle

      - name: Download macOS .dmg artifact
        uses: actions/download-artifact@v5
        with:
          name: desktop-macos-dmg
          path: macos-dmg

      - name: Prepare release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Zip WebAssembly payload
          if [ ! -d "wasm" ]; then
            echo "Missing wasm artifact directory"
            exit 1
          fi
          (cd wasm && zip -r ../release-assets/SalmonEgg-wasm.zip .)

          # Zip Windows desktop payload
          if [ ! -d "desktop" ]; then
            echo "Missing desktop artifact directory"
            exit 1
          fi
          (cd desktop && zip -r ../release-assets/SalmonEgg-desktop.zip .)

          # Collect macOS bundle artifacts (.app or pre-zipped fallback)
          if [ ! -d "macos-bundle" ]; then
            echo "Missing macos-bundle artifact directory"
            exit 1
          fi
          cp -R macos-bundle/* release-assets/

          # Copy DMG as-is
          DMG_PATH=$(find macos-dmg -maxdepth 1 -name "*.dmg" -print -quit)
          if [ -z "${DMG_PATH}" ]; then
            echo "No .dmg file found in macos-dmg artifact"
            exit 1
          fi
          cp "${DMG_PATH}" release-assets/

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
